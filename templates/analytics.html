<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Analytics Dashboard

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-microscope"></i>

        Skin AI

    </div>

    <ul>

        <a href="/">
        <li>

            <i class="fa-solid fa-house"></i>

            Dashboard

        </li>
        </a>

        <a href="/history_page">
        <li>

            <i class="fa-solid fa-clock-rotate-left"></i>

            History

        </li>
        </a>

        <a href="/analytics">
        <li class="active">

            <i class="fa-solid fa-chart-pie"></i>

            Analytics

        </li>
        </a>

    </ul>

</div>


<div class="main-content">

<h1>

<i class="fa-solid fa-chart-line"></i>

Analytics Dashboard

</h1>

<br>


<!-- Statistics -->

<div class="row">

<div class="col-lg-4">

<div class="glass-card">

<h3>Total Scans</h3>

<h1 id="totalScans">

0

</h1>

</div>

</div>



<div class="col-lg-4">

<div class="glass-card">

<h3>Benign Cases</h3>

<h1
id="benignCases"
style="color:#22c55e">

0

</h1>

</div>

</div>



<div class="col-lg-4">

<div class="glass-card">

<h3>Malignant Cases</h3>

<h1
id="malignantCases"
style="color:#ef4444">

0

</h1>

</div>

</div>

</div>


<br>


<!-- Charts -->

<div class="row">

<div class="col-lg-6">

<div class="glass-card">

<h3>

Prediction Distribution

</h3>

<hr>

<canvas
id="pieChart">

</canvas>

</div>

</div>



<div class="col-lg-6">

<div class="glass-card">

<h3>

Confidence Trend

</h3>

<hr>

<canvas
id="lineChart">

</canvas>

</div>

</div>

</div>

</div>


<script>

fetch("/stats")

.then(response=>response.json())

.then(data=>{

document.getElementById(
"totalScans"
).innerHTML=data.total;


document.getElementById(
"benignCases"
).innerHTML=data.benign;


document.getElementById(
"malignantCases"
).innerHTML=data.malignant;



// Pie Chart

new Chart(

document.getElementById(
"pieChart"
),

{

type:"doughnut",

data:{

labels:[

"Benign",
"Malignant"

],

datasets:[{

data:[

data.benign,
data.malignant

],

backgroundColor:[

"#22c55e",
"#ef4444"

]

}]

}

});



fetch("/history")

.then(response=>response.json())

.then(history=>{

let confidence=[];

let labels=[];

history.reverse();

history.forEach(item=>{

confidence.push(
item.confidence
);

labels.push("");

});



new Chart(

document.getElementById(
"lineChart"
),

{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Confidence",

data:confidence,

borderColor:"#60a5fa",

fill:false

}]

}

});

});

});

</script>

</body>
</html>
