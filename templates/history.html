<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Scan History

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-microscope"></i>

        Skin AI

    </div>

    <ul>

        <a href="/">
        <li>

            <i class="fa-solid fa-house"></i>

            Dashboard

        </li>
        </a>


        <a href="/history_page">
        <li class="active">

            <i class="fa-solid fa-clock-rotate-left"></i>

            History

        </li>
        </a>


        <a href="/analytics">
        <li>

            <i class="fa-solid fa-chart-pie"></i>

            Analytics

        </li>
        </a>

    </ul>

</div>



<div class="main-content">

<h2>

<i class="fa-solid fa-clock-rotate-left"></i>

Detection History

</h2>

<br>

<input
type="text"
class="form-control"
id="searchInput"
placeholder="Search prediction...">

<br>

<table
class="table table-dark table-hover">

<thead>

<tr>

<th>Image</th>

<th>Prediction</th>

<th>Confidence</th>

<th>Date</th>

</tr>

</thead>

<tbody
id="historyTable">

</tbody>

</table>

</div>


<script>

fetch("/history")

.then(response=>response.json())

.then(data=>{

    let rows="";

    data.forEach(item=>{

        let color=
        item.result==="BENIGN"
        ? "#22c55e"
        : "#ef4444";

        rows += `

        <tr>

        <td>

        <img
        src="/static/captures/${item.image}"
        width="120">

        </td>

        <td
        style="color:${color}">

        ${item.result}

        </td>

        <td>

        ${item.confidence}%

        </td>

        <td>

        ${item.time}

        </td>

        </tr>

        `;

    });

    document.getElementById(
        "historyTable"
    ).innerHTML=rows;

});



// Search

document.getElementById(
"searchInput"
)

.addEventListener(

"keyup",

function(){

let filter=
this.value.toUpperCase();

let rows=
document.querySelectorAll(
"#historyTable tr"
);

rows.forEach(row=>{

let text=
row.innerText.toUpperCase();

row.style.display=
text.includes(filter)
? ""
: "none";

});

});

</script>

</body>

</html>
